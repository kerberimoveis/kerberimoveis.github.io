<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking do VGV</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Preenche a tela e centraliza o container do ranking */
        body {
            background-color: #0d0d0d;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container travado na proporção real da imagem (1920x1080) */
        .screen-container {
            width: 1920px;
            height: 1080px;
            background-image: url('BACKGROUND%20RANKING%20SITE.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            flex-shrink: 0;
            transform-origin: center center;
        }

        /* Estilização dos Blocos do Pódio (Áreas de conteúdo sobrepostas às caixas pretas) */
        .podium-slot {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ajuste do tamanho dos Avatares para encaixar dentro do contorno das caixas */
        .avatar-photo {
            width: 250px;
            height: 250px;
            border-radius: 25px; /* Cantos arredondados combinando com os blocos */
            background-color: transparent;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        /* Textos centralizados dentro dos blocos escuros */
        .legend-container {
            text-align: center;
            width: 280px;
        }

        .name {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff; /* Texto branco para leitura perfeita no fundo preto */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 5px;
        }

        .score {
            font-size: 28px;
            font-weight: 800;
            color: #ff9f43; /* Tom dourado/laranja para os números */
        }

        /* =========================================================================
           CALIBRAÇÃO DE COORDENADAS (Posicionamento exato sobre a sua imagem)
           ========================================================================= */

        /* 1º LUGAR (CENTRO) 
           Largura do bloco: ~312px | Início horizontal: ~1188px */
        #slot-1 {
            top: 360px;
            left: 1200px;
        }

        /* 2º LUGAR (ESQUERDA) 
           Largura do bloco: ~295px | Início horizontal: ~862px */
        #slot-2 {
            top: 480px;
            left: 870px;
        }

        /* 3º LUGAR (DIREITA) 
           Largura do bloco: ~295px | Início horizontal: ~1532px */
        #slot-3 {
            top: 480px;
            left: 1540px;
        }

        /* ========================================================================= */

        .loading, .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 24px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="screen-container" id="main-container">
    
    <div id="loading" class="loading">Carregando dados...</div>
    <div id="error" class="error" style="display: none;">Erro ao carregar os dados.</div>

    <div id="podium-container" style="display: none;">
        
        <!-- Segundo Lugar (Esquerda) -->
        <div class="podium-slot" id="slot-2">
            <div class="avatar-photo" id="photo-2"></div>
            <div class="legend-container">
                <div class="name" id="name-2">-</div>
                <div class="score" id="score-2">0</div>
            </div>
        </div>

        <!-- Primeiro Lugar (Centro) -->
        <div class="podium-slot" id="slot-1">
            <div class="avatar-photo" id="photo-1"></div>
            <div class="legend-container">
                <div class="name" id="name-1">-</div>
                <div class="score" id="score-1">0</div>
            </div>
        </div>

        <!-- Terceiro Lugar (Direita) -->
        <div class="podium-slot" id="slot-3">
            <div class="avatar-photo" id="photo-3"></div>
            <div class="legend-container">
                <div class="name" id="name-3">-</div>
                <div class="score" id="score-3">0</div>
            </div>
        </div>

    </div>
</div>

<script>
    const URL_PLANILHA_1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzNtrrrqc63MiPQ88VaT7FAeczwujFdk8KiXSHXfoNRAf397iFHvw-iluIR1TkrNevow--QHIwbPH7/pub?gid=277533887&single=true&output=csv';
    const URL_PLANILHA_2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlshA2wJmrhz2fjEU5x1Y9on1uVLiyJXjXuK7w9HZVhGx3waQJe6fGM0o_0NhnsAbZEqud4EwOMadV/pub?gid=539484592&single=true&output=csv';

    // Responsividade Proporcional: Mantém o layout perfeito independente do tamanho do monitor
    function ajustarEscala() {
        const container = document.getElementById('main-container');
        const larguraTela = window.innerWidth;
        const alturaTela = window.innerHeight;
        
        const escalaX = larguraTela / 1920;
        const escalaY = alturaTela / 1080;
        const escalaFinal = Math.min(escalaX, escalaY);
        
        container.style.transform = `scale(${escalaFinal})`;
    }
    window.addEventListener('resize', ajustarEscala);
    ajustarEscala();

    function parseCSVLine(line, separador) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === separador && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    }

    function csvToArrays(csvText) {
        const primeiraLinha = csvText.split(/\r?\n/)[0] || '';
        const contagemVirgula = (primeiraLinha.match(/,/g) || []).length;
        const contagemPontoVirgula = (primeiraLinha.match(/;/g) || []).length;
        const separador = contagemPontoVirgula > contagemVirgula ? ';' : ',';

        const lines = csvText.split(/\r?\n/);
        const result = [];

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;

            const columns = parseCSVLine(lines[i], separador);
            if (columns.length < 2) continue;

            const nomeCru = columns[0] || '';
            const valorCru = columns[1] || '0';
            const nomeFotoArquivo = columns[2] || ''; 

            const valorLimpo = valorCru.replace(/\./g, '').replace(',', '.');
            const valorNumerico = parseFloat(valorLimpo) || 0;

            if (valorNumerico === 0) continue; 

            result.push({
                nome: nomeCru,
                valorTexto: valorCru, 
                valorNum: valorNumerico,
                foto: nomeFotoArquivo
            });
        }
        return result;
    }

    async function carregarTop3() {
        try {
            const [response1, response2] = await Promise.all([
                fetch(URL_PLANILHA_1),
                fetch(URL_PLANILHA_2)
            ]);

            if (!response1.ok || !response2.ok) throw new Error('Erro ao carregar dados.');

            const dataText1 = await response1.text();
            const dataText2 = await response2.text();

            const listaItens1 = csvToArrays(dataText1);
            const listaItens2 = csvToArrays(dataText2);
            const listaCompleta = listaItens1.concat(listaItens2);

            if (listaCompleta.length === 0) throw new Error('Nenhum dado válido.');

            listaCompleta.sort((a, b) => b.valorNum - a.valorNum);

            for (let i = 0; i < 3; i++) {
                const item = listaCompleta[i];
                const posicao = i + 1;
                const photoElement = document.getElementById(`photo-${posicao}`);

                if (item) {
                    document.getElementById(`name-${posicao}`).innerText = item.nome || 'Sem Nome';
                    document.getElementById(`score-${posicao}`).innerText = item.valorTexto || '0';
                    
                    if (item.foto && item.foto.trim() !== '') {
                        photoElement.style.backgroundImage = `url('FOTOS/${item.foto}')`;
                    } else {
                        photoElement.style.backgroundImage = 'none';
                    }
                } else {
                    document.getElementById(`name-${posicao}`).innerText = 'N/A';
                    document.getElementById(`score-${posicao}`).innerText = '-';
                    photoElement.style.backgroundImage = 'none';
                }
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('podium-container').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').style.display = 'none';
            const erroDiv = document.getElementById('error');
            erroDiv.innerText = "Erro: " + error.message;
            erroDiv.style.display = 'block';
        }
    }

    carregarTop3();
</script>
</body>
</html>
