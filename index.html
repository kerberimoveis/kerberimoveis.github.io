<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Vendedor do Mês</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Remove as barras e fixa o background do sistema no topo esquerdo */
        body {
            background-color: #000000;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            overflow: hidden;
        }

        /* CONFIGURAÇÃO PARA PREENCHER TODA A TELA SEM BORDAS PRETAS */
        .screen-container {
            width: 1920px;
            height: 1080px;
            background-image: url('BACKGROUND%20RANKING%20SITE.png');
            background-size: 100% 100%;
            background-position: center center;
            background-repeat: no-repeat;
            position: absolute;
            flex-shrink: 0;
            transform-origin: top left;
        }

        /* Formato Oval vertical ajustado para o topo do bloco preto */
        .avatar-photo {
            position: absolute;
            width: 200px;
            height: 240px;
            border-radius: 40px;
            background-color: transparent;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        /* Caixas de texto posicionadas na base interna dos blocos pretos */
        .legend-container {
            position: absolute;
            width: 260px; /* Reduzido para não vazar a borda interna do bloco */
            text-align: center;
            z-index: 3;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff; /* Alterado para BRANCO para dar leitura dentro do bloco preto */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 2px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .score {
            font-size: 22px;
            font-weight: 700;
            color: #e67e22; /* Mantido o tom laranja em destaque */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* LOGOTIPO KERBER - Posicionado cirurgicamente no canto superior esquerdo */
        .logo-kerber {
            position: absolute;
            top: 0px;
            right: 0px;
            width: 220px; /* Tamanho ajustado e elegante para o canto superior */
            height: auto;
            z-index: 3;
            display: block;
        }

        /* Estilização com FUNDO PRETO SÓLIDO para o VGV Total na base do painel */
        .vgv-container {
            position: absolute;
            bottom: 150px;
            left: 1175px;
            text-align: center;
            z-index: 3;
            background-color: #000000; /* Fundo preto puro */
            padding: 15px 35px;
            border-radius: 12px;
            border: 2px solid #e67e22; /* Borda laranja combinando com o sistema */
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }

        .vgv-title {
            font-size: 20px;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .vgv-value {
            font-size: 38px;
            color: #2ecc71; /* Verde vivo para destacar o faturamento total */
            font-weight: 800;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* =========================================================================
           ALINHAMENTO CIRÚRGICO INTEIRAMENTE DENTRO DOS QUADRADOS PRETOS
           ========================================================================= */

        /* 1º LUGAR (CENTRO) */
        #photo-1 {
            top: 345px;
            left: 1260px;
        }
        #legend-1 {
            top: 600px;
            left: 1230px; /* Centralizado horizontalmente no bloco central */
        }

        /* 2º LUGAR (ESQUERDA) */
        #photo-2 {
            top: 475px;
            left: 935px;
            width: 180px;
            height: 216px;
        }
        #legend-2 {
            top: 700px;
            left: 895px; /* Centralizado horizontalmente no bloco da esquerda */
        }

        /* 3º LUGAR (DIREITA) */
        #photo-3 {
            top: 475px;
            left: 1610px;
            width: 170px;
            height: 204px;
        }
        #legend-3 {
            top: 700px;
            left: 1560px; /* Centralizado horizontalmente no bloco da direita */
        }

        /* ========================================================================= */

        .loading, .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffffff;
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 22px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="screen-container" id="main-container">
    
    <div id="loading" class="loading">Carregando dados...</div>
    <div id="error" class="error" style="display: none;">Erro ao carregar os dados.</div>

    <div id="podium-elements" style="display: none;">
        
        <!-- Logotipo Kerber no Canto -->
        <img src="LOGO%20KERBER.jpeg" alt="Logo Kerber" class="logo-kerber">

        <!-- Primeiro Lugar -->
        <div class="avatar-photo" id="photo-1"></div>
        <div class="legend-container" id="legend-1">
            <div class="name" id="name-1">-</div>
            <div class="score" id="score-1">0</div>
        </div>

        <!-- Segundo Lugar -->
        <div class="avatar-photo" id="photo-2"></div>
        <div class="legend-container" id="legend-2">
            <div class="name" id="name-2">-</div>
            <div class="score" id="score-2">0</div>
        </div>

        <!-- Terceiro Lugar -->
        <div class="avatar-photo" id="photo-3"></div>
        <div class="legend-container" id="legend-3">
            <div class="name" id="name-3">-</div>
            <div class="score" id="score-3">0</div>
        </div>

        <!-- Container do VGV Total com fundo preto -->
        <div class="vgv-container" id="vgv-container">
            <div class="vgv-title">VGV Total</div>
            <div class="vgv-value" id="vgv-total">R$ 0,00</div>
        </div>

    </div>
</div>

<script>
    const URL_PLANILHA_1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzNtrrrqc63MiPQ88VaT7FAeczwujFdk8KiXSHXfoNRAf397iFHvw-iluIR1TkrNevow--QHIwbPH7/pub?gid=277533887&single=true&output=csv';
    const URL_PLANILHA_2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlshA2wJmrhz2fjEU5x1Y9on1uVLiyJXjXuK7w9HZVhGx3waQJe6fGM0o_0NhnsAbZEqud4EwOMadV/pub?gid=539484592&single=true&output=csv';

    function ajustarEscala() {
        const container = document.getElementById('main-container');
        const larguraTela = window.innerWidth;
        const alturaTela = window.innerHeight;
        
        const escalaX = larguraTela / 1920;
        const escalaY = alturaTela / 1080;
        
        container.style.transform = `scale(${escalaX}, ${escalaY})`;
    }
    
    window.addEventListener('resize', ajustarEscala);
    ajustarEscala();

    // Recarga On Demand nativa via teclado ('R' ou 'Espaço') que ignora o cache
    window.addEventListener('keydown', function(event) {
        if (event.key.toLowerCase() === 'r' || event.key === ' ') {
            console.log('Forçando atualização completa da interface...');
            window.location.search = '?v=' + new Date().getTime();
        }
    });

    function parseCSVLine(line, separador) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === separador && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    }

    function limparValorMonetario(valorCru) {
        if (!valorCru) return 0;
        const valorLimpo = valorCru.replace(/\./g, '').replace(',', '.');
        return parseFloat(valorLimpo) || 0;
    }

    function extrairVgvDaSegundaLinha(csvText, separador) {
        const lines = csvText.split(/\r?\n/);
        if (lines.length > 1 && lines[1].trim()) {
            const columns = parseCSVLine(lines[1], separador);
            if (columns.length >= 4) {
                return limparValorMonetario(columns[3]);
            }
        }
        return 0;
    }

    function csvToArrays(csvText) {
        const primeiraLinha = csvText.split(/\r?\n/)[0] || '';
        const contagemVirgula = (primeiraLinha.match(/,/g) || []).length;
        const contagemPontoVirgula = (primeiraLinha.match(/;/g) || []).length;
        const separador = contagemPontoVirgula > contagemVirgula ? ';' : ',';

        const lines = csvText.split(/\r?\n/);
        const result = [];

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;

            const columns = parseCSVLine(lines[i], separador);
            if (columns.length < 2) continue;

            const nomeCru = columns[0] || '';
            const valorCru = columns[1] || '0';
            const nomeFotoArquivo = columns[2] || ''; 

            const valorNumerico = limparValorMonetario(valorCru);

            if (valorNumerico === 0) continue; 

            result.push({
                nome: nomeCru,
                valorTexto: valorCru, 
                valorNum: valorNumerico,
                foto: nomeFotoArquivo
            });
        }
        return { itens: result, separador: separador };
    }

    async function carregarTop3() {
        try {
            const timestamp = new Date().getTime();
            const [response1, response2] = await Promise.all([
                fetch(`${URL_PLANILHA_1}&cache=${timestamp}`),
                fetch(`${URL_PLANILHA_2}&cache=${timestamp}`)
            ]);

            if (!response1.ok || !response2.ok) throw new Error('Erro ao buscar dados das planilhas.');

            const dataText1 = await response1.text();
            const dataText2 = await response2.text();

            const resultado1 = csvToArrays(dataText1);
            const resultado2 = csvToArrays(dataText2);
            
            const listaCompleta = resultado1.itens.concat(resultado2.itens);

            const vgv1 = extrairVgvDaSegundaLinha(dataText1, resultado1.separador);
            const vgv2 = extrairVgvDaSegundaLinha(dataText2, resultado2.separador);
            const vgvTotal = vgv1 + vgv2;

            if (listaCompleta.length === 0) {
                throw new Error('Nenhum dado com valor encontrado.');
            }

            listaCompleta.sort((a, b) => b.valorNum - a.valorNum);

            for (let i = 0; i < 3; i++) {
                const item = listaCompleta[i];
                const posicao = i + 1;
                const photoElement = document.getElementById(`photo-${posicao}`);

                if (item) {
                    document.getElementById(`name-${posicao}`).innerText = item.nome || 'Sem Nome';
                    document.getElementById(`score-${posicao}`).innerText = item.valorTexto || '0';
                    
                    if (item.foto && item.foto.trim() !== '') {
                        photoElement.style.backgroundImage = `url('FOTOS/${item.foto}?v=${timestamp}')`;
                    } else {
                        photoElement.style.backgroundImage = 'none';
                    }
                } else {
                    document.getElementById(`name-${posicao}`).innerText = 'N/A';
                    document.getElementById(`score-${posicao}`).innerText = '-';
                    photoElement.style.backgroundImage = 'none';
                }
            }

            document.getElementById('vgv-total').innerText = vgvTotal.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('podium-elements').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').style.display = 'none';
            const erroDiv = document.getElementById('error');
            erroDiv.innerText = "Erro: " + error.message;
            erroDiv.style.display = 'block';
        }
    }

    carregarTop3();
    setInterval(carregarTop3, 15000);
</script>
</body>
</html>
