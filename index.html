<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 3 Líderes de Vendas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: orange;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #1f2937;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 700;
        }

        .podium {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            height: 200px;
            padding: 10px;
        }

        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
            transition: transform 0.3s ease;
        }

        .podium-place:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            border: 3px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .name {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .column {
            width: 100%;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1);
        }

        .first .column { height: 100px; background: linear-gradient(135deg, #fcd34d, #f59e0b); }
        .first .avatar { border-color: #f59e0b; background: #fef3c7; color: #d97706; }

        .second .column { height: 75px; background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .second .avatar { border-color: #94a3b8; background: #f1f5f9; color: #475569; }

        .third .column { height: 50px; background: linear-gradient(135deg, #fdba74, #ea580c); }
        .third .avatar { border-color: #ea580c; background: #fff7ed; color: #c2410c; }

        .loading, .error {
            color: #6b7280;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Top 3 Líderes</h1>
    
    <div id="loading" class="loading">Carregando dados da planilha...</div>
    <div id="error" class="error" style="display: none;">Erro ao carregar os dados. Verifique a configuração.</div>

    <div id="podium-container" class="podium" style="display: none;">
        <!-- Segundo Lugar -->
        <div class="podium-place second" id="place-2">
            <div class="avatar" id="avatar-2">2º</div>
            <div class="name" id="name-2">-</div>
            <div class="score" id="score-2">0</div>
            <div class="column">2</div>
        </div>

        <!-- Primeiro Lugar -->
        <div class="podium-place first" id="place-1">
            <div class="avatar" id="avatar-1">1º</div>
            <div class="name" id="name-1">-</div>
            <div class="score" id="score-1">0</div>
            <div class="column">1</div>
        </div>

        <!-- Terceiro Lugar -->
        <div class="podium-place third" id="place-3">
            <div class="avatar" id="avatar-3">3º</div>
            <div class="name" id="name-3">-</div>
            <div class="score" id="score-3">0</div>
            <div class="column">3</div>
        </div>
    </div>
</div>

<script>
    // ⚠️ SUBSTITUA PELO SEU LINK CSV PUBLICADO DO GOOGLE SHEETS
    const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzNtrrrqc63MiPQ88VaT7FAeczwujFdk8KiXSHXfoNRAf397iFHvw-iluIR1TkrNevow--QHIwbPH7/pub?gid=277533887&single=true&output=csv';

    // Converte o CSV quebrando em linhas e mapeando por índice de coluna
    function parseCSVLine(line, separador) {
    const result = [];
    let current = '';
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            inQuotes = !inQuotes; // Ignora o separador se estiver dentro de aspas
        } else if (char === separador && !inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim());
    return result;
}

function csvToArrays(csvText) {
    // Descobre se o Google Sheets usou ponto e vírgula (padrão Brasil) ou vírgula (padrão EUA)
    // Procuramos na primeira linha qual caractere aparece mais
    const primeiraLinha = csvText.split(/\r?\n/)[0] || '';
    const contagemVirgula = (primeiraLinha.match(/,/g) || []).length;
    const contagemPontoVirgula = (primeiraLinha.match(/;/g) || []).length;
    
    // Define o separador correto dinamicamente
    const separador = contagemPontoVirgula > contagemVirgula ? ';' : ',';

    const lines = csvText.split(/\r?\n/);
    const result = [];

    // Começa da linha 1 para pular os cabeçalhos (Nome, Valor)
    for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        
        const columns = parseCSVLine(lines[i], separador);
        
        // Garante que existem pelo menos duas colunas preenchidas na linha
        if (columns.length < 2) continue;

        const nomeCru = columns[0] || '';
        const valorCru = columns[1] || '0';

        // Tratamento do número brasileiro ("100.000,00" -> 100000.00)
        // Remove pontos de milhar e troca vírgula decimal por ponto para o JS entender
        const valorLimpo = valorCru.replace(/\./g, '').replace(',', '.');
        const valorNumerico = parseFloat(valorLimpo) || 0;

        result.push({
            nome: nomeCru,
            valorTexto: valorCru, 
            valorNum: valorNumerico 
        });
    }
    return result;
}

    async function carregarTop3() {
    try {
        const response = await fetch(URL_PLANILHA);
        if (!response.ok) throw new Error('O link da planilha respondeu com erro: ' + response.status);
        
        const dataText = await response.text();
        
        // Teste básico: se o Google retornar HTML em vez de CSV, o link está errado
        if (dataText.includes('<html') || dataText.includes('<DOCTYPE')) {
            throw new Error('O link usado aponta para uma página HTML e não para um arquivo CSV. Certifique-se de publicar como CSV.');
        }

        const listaItens = csvToArrays(dataText);

        if (listaItens.length === 0) {
            throw new Error('A planilha foi lida, mas nenhum dado foi encontrado. Verifique se ela possui linhas preenchidas.');
        }

        listaItens.sort((a, b) => b.valorNum - a.valorNum);

        for (let i = 0; i < 3; i++) {
            const item = listaItens[i];
            const posicao = i + 1;
            
            if (item) {
                document.getElementById(`name-${posicao}`).innerText = item.nome || 'Sem Nome';
                document.getElementById(`score-${posicao}`).innerText = item.valorTexto || '0';
            } else {
                document.getElementById(`name-${posicao}`).innerText = 'N/A';
                document.getElementById(`score-${posicao}`).innerText = '-';
            }
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('podium-container').style.display = 'flex';

    } catch (error) {
        console.error(error);
        document.getElementById('loading').style.display = 'none';
        // Mostra o erro real na tela para sabermos o que corrigir
        const erroDiv = document.getElementById('error');
        erroDiv.innerText = "Erro: " + error.message;
        erroDiv.style.display = 'block';
    }
}

    carregarTop3();
</script>
</body>
</html>
