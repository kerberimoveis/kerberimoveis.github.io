<script>
    // Coloque o ID da sua planilha aqui
    const SHEET_ID = 'SEU_ID_DA_PLANILHA_AQUI'; 
    
    // URL da planilha publicada como Página da Web
    const URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRzNtrrrqc63MiPQ88VaT7FAeczwujFdk8KiXSHXfoNRAf397iFHvw-iluIR1TkrNevow--QHIwbPH7/pubhtml`;

    async function fetchTop3() {
        try {
            const response = await fetch(URL);
            if (!response.ok) throw new Error('Falha ao acessar a página da planilha');
            
            const htmlText = await response.text();
            
            // Parser para ler o HTML da planilha
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            // Seleciona todas as linhas da tabela
            const rows = doc.querySelectorAll('table tbody tr');
            
            // Array para armazenar todos os dados brutos da planilha
            let allData = [];

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].querySelectorAll('td');
                
                if (cells.length >= 2) {
                    const name = cells[0].textContent.trim();
                    let scoreText = cells[1].textContent.trim();
                    
                    if (!name && !scoreText) continue; // Pula linhas vazias

                    // Tratamento do número: remove pontos de milhar e troca vírgula decimal por ponto
                    // Exemplo: "1.500,50" vira 1500.50 para o JavaScript conseguir calcular correto
                    scoreText = scoreText.replace(/\./g, '').replace(',', '.');
                    const score = parseFloat(scoreText);

                    // Só adiciona se o nome for válido e o score for um número real
                    if (name && !isNaN(score)) {
                        allData.push({ name, score, originalScoreText: cells[1].textContent.trim() });
                    }
                }
            }

            // Ordena a lista inteira colocando os MAIORES valores no topo (ordem decrescente)
            allData.sort((a, b) => b.score - a.score);

            // Pega apenas os 3 primeiros da lista já ordenada
            const top3 = allData.slice(0, 3);
            let htmlContent = '';

            if (top3.length === 0) {
                document.getElementById('podium-container').innerHTML = "Nenhum dado válido encontrado.";
                return;
            }

            // Monta o HTML do pódio com o Top 3 real
            top3.forEach((item, index) => {
                htmlContent += `
                    <div class="podium-item">
                        <span class="position pos-${index + 1}">${index + 1}</span>
                        <span class="name">${item.name}</span>
                        <span class="score">${item.originalScoreText}</span>
                    </div>
                `;
            });

            document.getElementById('podium-container').innerHTML = htmlContent;

        } catch (error) {
            console.error("Erro ao processar dados:", error);
            document.getElementById('podium-container').innerHTML = "Erro ao carregar dados. Verifique o ID.";
        }
    }

    // Executa ao carregar a página
    fetchTop3();
    
    // Atualiza automaticamente a cada 30 segundos
    setInterval(fetchTop3, 30000);
</script>
