<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking do VGV</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* O container agora usa a imagem enviada como plano de fundo fixo */
        .screen-container {
            width: 1920px;
            height: 1080px;
            background-image: url('BACKGROUND RANKING SITE.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            /* Se quiser que ele se ajuste a telas menores proporcionalmente: */
            zoom: 1; 
        }

        /* Posicionamento estratégico absoluto por cima das molduras da imagem */
        .podium-layer {
            position: absolute;
            top: 250px;
            right: 35px;
            width: 535px;
            height: 520px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .podium-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 165px;
            position: relative;
        }

        /* Ajustes finos individuais para alinhar milimetricamente com cada oval da imagem */
        #slot-2 { margin-top: 110px; } /* 2º Lugar */
        #slot-1 { margin-top: 0px; }   /* 1º Lugar */
        #slot-3 { margin-top: 110px; } /* 3º Lugar */

        /* A foto se torna oval para casar perfeitamente com o desenho de fundo */
        .avatar-photo {
            width: 96px;
            height: 125px;
            border-radius: 50% / 50%;
            background-color: transparent;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin-top: 100px; /* Empurra a foto para o centro da moldura dourada */
        }

        /* Legendas posicionadas logo abaixo dos blocos pretos */
        .legend-container {
            margin-top: 135px; /* Empurra o texto para fora e abaixo do bloco preto */
            text-align: center;
            width: 190px;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 2px;
        }

        .score {
            font-size: 19px;
            font-weight: 600;
            color: #e67e22; /* Tom alaranjado elegante para destacar o valor */
        }

        .loading, .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="screen-container">

    <div id="loading" class="loading">Carregando dados...</div>
    <div id="error" class="error" style="display: none;">Erro ao carregar os dados.</div>

    <div id="podium-container" class="podium-layer" style="display: none;">

        <!-- Segundo Lugar (Esquerda) -->
        <div class="podium-slot" id="slot-2">
            <div class="avatar-photo" id="photo-2"></div>
            <div class="legend-container">
                <div class="name" id="name-2">-</div>
                <div class="score" id="score-2">0</div>
            </div>
        </div>

        <!-- Primeiro Lugar (Centro) -->
        <div class="podium-slot" id="slot-1">
            <div class="avatar-photo" id="photo-1"></div>
            <div class="legend-container">
                <div class="name" id="name-1">-</div>
                <div class="score" id="score-1">0</div>
            </div>
        </div>

        <!-- Terceiro Lugar (Direita) -->
        <div class="podium-slot" id="slot-3">
            <div class="avatar-photo" id="photo-3"></div>
            <div class="legend-container">
                <div class="name" id="name-3">-</div>
                <div class="score" id="score-3">0</div>
            </div>
        </div>

    </div>
</div>

<script>
    const URL_PLANILHA_1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzNtrrrqc63MiPQ88VaT7FAeczwujFdk8KiXSHXfoNRAf397iFHvw-iluIR1TkrNevow--QHIwbPH7/pub?gid=277533887&single=true&output=csv';
    const URL_PLANILHA_2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlshA2wJmrhz2fjEU5x1Y9on1uVLiyJXjXuK7w9HZVhGx3waQJe6fGM0o_0NhnsAbZEqud4EwOMadV/pub?gid=539484592&single=true&output=csv'; // <--- Substitua pelo link CSV da sua segunda planilha

    function parseCSVLine(line, separador) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === separador && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    }

    function csvToArrays(csvText) {
        const primeiraLinha = csvText.split(/\r?\n/)[0] || '';
        const contagemVirgula = (primeiraLinha.match(/,/g) || []).length;
        const contagemPontoVirgula = (primeiraLinha.match(/;/g) || []).length;
        const separador = contagemPontoVirgula > contagemVirgula ? ';' : ',';

        const lines = csvText.split(/\r?\n/);
        const result = [];

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;

            const columns = parseCSVLine(lines[i], separador);

            if (columns.length < 2) continue;

            const nomeCru = columns[0] || '';
            const valorCru = columns[1] || '0';
            const nomeFotoArquivo = columns[2] || ''; 

            const valorLimpo = valorCru.replace(/\./g, '').replace(',', '.');
            const valorNumerico = parseFloat(valorLimpo) || 0;

            if (valorNumerico === 0) continue; 

            result.push({
                nome: nomeCru,
                valorTexto: valorCru, 
                valorNum: valorNumerico,
                foto: nomeFotoArquivo
            });
        }
        return result;
    }

    async function carregarTop3() {
        try {
            const [response1, response2] = await Promise.all([
                fetch(URL_PLANILHA_1),
                fetch(URL_PLANILHA_2)
            ]);

            if (!response1.ok || !response2.ok) throw new Error('Erro ao buscar dados das planilhas.');

            const dataText1 = await response1.text();
            const dataText2 = await response2.text();

            if (dataText1.includes('<html') || dataText2.includes('<html')) {
                throw new Error('Um dos links retornou HTML em vez de CSV.');
            }

            const listaItens1 = csvToArrays(dataText1);
            const listaItens2 = csvToArrays(dataText2);
            const listaCompleta = listaItens1.concat(listaItens2);

            if (listaCompleta.length === 0) {
                throw new Error('Nenhum dado encontrado.');
            }

            listaCompleta.sort((a, b) => b.valorNum - a.valorNum);

            for (let i = 0; i < 3; i++) {
                const item = listaCompleta[i];
                const posicao = i + 1;
                const photoElement = document.getElementById(`photo-${posicao}`);

                if (item) {
                    document.getElementById(`name-${posicao}`).innerText = item.nome || 'Sem Nome';
                    document.getElementById(`score-${posicao}`).innerText = item.valorTexto || '0';

                    if (item.foto && item.foto.trim() !== '') {
                        photoElement.style.backgroundImage = `url('FOTOS/${item.foto}')`;
                        photoElement.style.backgroundPosition = 'center';
                        photoElement.style.backgroundSize = 'cover';
                    } else {
                        photoElement.style.backgroundImage = 'none';
                    }
                } else {
                    document.getElementById(`name-${posicao}`).innerText = 'N/A';
                    document.getElementById(`score-${posicao}`).innerText = '-';
                    photoElement.style.backgroundImage = 'none';
                }
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('podium-container').style.display = 'flex';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').style.display = 'none';
            const erroDiv = document.getElementById('error');
            erroDiv.innerText = "Erro: " + error.message;
            erroDiv.style.display = 'block';
        }
    }

    carregarTop3();
</script>
</body>
</html>
