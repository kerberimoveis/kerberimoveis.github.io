<script>
    // Coloque o ID da sua planilha aqui
    const SHEET_ID = '2PACX-1vRzNtrrrqc63MiPQ88VaT7FAeczwujFdk8KiXSHXfoNRAf397iFHvw-iluIR1TkrNevow--QHIwbPH7'; 
    
    // URL da planilha publicada como Página da Web
    const URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pubhtml`;

    async function fetchTop3() {
        try {
            const response = await fetch(URL);
            if (!response.ok) throw new Error('Falha ao acessar a página da planilha');
            
            const htmlText = await response.text();
            
            // Criamos um elemento temporário para o JavaScript conseguir ler o HTML do Google
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            // Seleciona todas as linhas da tabela (tr) dentro da planilha
            const rows = doc.querySelectorAll('table tbody tr');
            let htmlContent = '';
            
            // Contador para garantir que pegamos apenas as 3 primeiras linhas válidas
            let count = 0;

            for (let i = 0; i < rows.length; i++) {
                if (count >= 3) break; // Para quando achar o Top 3

                const cells = rows[i].querySelectorAll('td');
                
                // Verifica se a linha tem pelo menos duas colunas preenchidas (Nome e Valor)
                if (cells.length >= 2) {
                    const name = cells[0].textContent.trim();  // Coluna A
                    const score = cells[1].textContent.trim(); // Coluna B
                    
                    // Pula linhas que estejam completamente vazias
                    if (!name && !score) continue;

                    htmlContent += `
                        <div class="podium-item">
                            <span class="position pos-${count + 1}">${count + 1}</span>
                            <span class="name">${name}</span>
                            <span class="score">${score}</span>
                        </div>
                    `;
                    count++;
                }
            }

            if (count === 0) {
                document.getElementById('podium-container').innerHTML = "Nenhum dado encontrado na planilha.";
            } else {
                document.getElementById('podium-container').innerHTML = htmlContent;
            }

        } catch (error) {
            console.error("Erro ao buscar dados:", error);
            document.getElementById('podium-container').innerHTML = "Erro ao carregar dados. Verifique o ID.";
        }
    }

    // Executa ao carregar a página
    fetchTop3();
    
    // Atualiza automaticamente a cada 30 segundos
    setInterval(fetchTop3, 30000);
</script>
