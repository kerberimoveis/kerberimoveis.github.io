<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 3 Líderes de Vendas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: orange;
            padding: 40px 30px; /* ATUALIZADO: Usando padding corrigido */
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        /* --- NOVO: Estilo para o contêiner do título --- */
        .title-container {
            display: flex;
            justify-content: center; /* Centraliza o grupo horizontalmente */
            align-items: center;    /* Centraliza verticalmente texto e imagem */
            margin-top: 10px;       /* Controla a altura */
            margin-bottom: 45px;    /* Distância até o pódio */
        }

        h1 {
            color: #000000;         /* ATUALIZADO: Cor corrigida */
            margin: 0;             /* NOVO: Remove margens internas do h1 */
            font-size: 28px;
            font-weight: 700;
        }

        /* --- NOVO: Estilo para a imagem --- */
        .title-image {
            width: 40px;           /* Ajuste o tamanho conforme necessário */
            height: auto;
            margin-left: 20px;     /* Espaçamento entre o texto e a imagem */
        }

        .podium {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            height: 210px;
            padding: 10px;
        }

        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
            transition: transform 0.3s ease;
        }

        .podium-place:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            border: 3px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .name {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .column {
            width: 100%;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1);
        }

        .first .column { height: 100px; background: linear-gradient(135deg, #fcd34d, #f59e0b); }
        .first .avatar { border-color: #f59e0b; background: #fef3c7; color: #d97706; }

        .second .column { height: 75px; background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .second .avatar { border-color: #94a3b8; background: #f1f5f9; color: #475569; }

        .third .column { height: 50px; background: linear-gradient(135deg, #fdba74, #ea580c); }
        .third .avatar { border-color: #ea580c; background: #fff7ed; color: #c2410c; }

        .loading, .error {
            color: #ffffff;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-container">
        <h1>🏆 Top 3 Líderes de Vendas</h1>
        <!-- NOVO: Substitua 'URL_DA_SUA_IMAGEM.png' pelo caminho real da sua imagem -->
        <img src="LOGO KERBER.jpeg" alt="Ícone de Vendas" class="title-image">
    </div>
    
    <div id="loading" class="loading">Carregando dados da planilha...</div>
    <div id="error" class="error" style="display: none;">Erro ao carregar os dados. Verifique a configuração.</div>

    <div id="podium-container" class="podium" style="display: none;">
        <!-- Segundo Lugar -->
        <div class="podium-place second" id="place-2">
            <div class="avatar" id="avatar-2">2º</div>
            <div class="name" id="name-2">-</div>
            <div class="score" id="score-2">0</div>
            <div class="column">2</div>
        </div>

        <!-- Primeiro Lugar -->
        <div class="podium-place first" id="place-1">
            <div class="avatar" id="avatar-1">1º</div>
            <div class="name" id="name-1">-</div>
            <div class="score" id="score-1">0</div>
            <div class="column">1</div>
        </div>

        <!-- Terceiro Lugar -->
        <div class="podium-place third" id="place-3">
            <div class="avatar" id="avatar-3">3º</div>
            <div class="name" id="name-3">-</div>
            <div class="score" id="score-3">0</div>
            <div class="column">3</div>
        </div>
    </div>
</div>

</script>
</body>
</html>
