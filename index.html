<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 3 Leaderboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .leaderboard {
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        h2 { margin-bottom: 1.5rem; color: #38bdf8; }
        .podium-item {
            display: flex;
            align-items: center;
            background: #334155;
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .podium-item:hover { transform: scale(1.02); }
        .position {
            font-size: 1.2rem;
            font-weight: bold;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
        }
        /* Cores do Pódio */
        .pos-1 { background: #eab308; color: #000; } /* Ouro */
        .pos-2 { background: #cbd5e1; color: #000; } /* Prata */
        .pos-3 { background: #b45309; color: #fff; } /* Bronze */
        
        .name { flex-grow: 1; text-align: left; font-weight: 500; }
        .score { font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

    <div class="leaderboard">
        <h2>🏆 Top 3 Atualizado</h2>
        <div id="podium-container">Carregando pódio...</div>
    </div>

    <script>
        const SHEET_ID = '1sL416USkpSOg0_Op_f7rdbBOEeJDTdPoqmgylnDPaSY';
        // Buscando a primeira aba (pode mudar o nome se necessário)
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchTop3() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                
                // O Google retorna um rascunho de objeto que precisamos limpar para virar JSON puro
                const jsonText = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
                const data = JSON.parse(jsonText);
                
                // Mapeia as linhas da planilha
                const rows = data.table.rows;
                let htmlContent = '';

                // Pegamos apenas os 3 primeiros (ou menos, se a planilha tiver menos)
                const limit = Math.min(rows.length, 3);

                for (let i = 0; i < limit; i++) {
                    const name = rows[i].c[0] ? rows[i].c[0].v : 'N/A'; // Coluna A
                    const score = rows[i].c[1] ? rows[i].c[1].v : 0;    // Coluna B
                    
                    htmlContent += `
                        <div class="podium-item">
                            <span class="position pos-${i+1}">${i+1}</span>
                            <span class="name">${name}</span>
                            <span class="score">${score}</span>
                        </div>
                    `;
                }

                document.getElementById('podium-container').innerHTML = htmlContent;
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                document.getElementById('podium-container').innerHTML = "Erro ao carregar dados.";
            }
        }

        // Carrega ao abrir a página
        fetchTop3();
        
        // Atualiza automaticamente a cada 30 segundos
        setInterval(fetchTop3, 30000);
    </script>
</body>
</html>
